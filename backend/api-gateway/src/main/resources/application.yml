spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**
server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
